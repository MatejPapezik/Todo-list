<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="app_container">
      <h1>To-Do List</h1>
      <div class="todo_container">
        <div class="add_task_line">
          <input
            id="Input_task"
            type="text"
            placeholder="Přidej úkol"
            maxlength="40"
          />
          <button id="Add_task_button" onclick="Button_add_task()">
            Přidat úkol
          </button>
        </div>
        <p id="Warning_message" style="display: none">
          Dosáhli jste maximálního počtu znaků!
        </p>
        <ul id="Show_list"></ul>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
